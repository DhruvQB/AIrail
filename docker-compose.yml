services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airail_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://airail_user:airail_pass@db:5432/airail_db
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app       # live-reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: airail_postgres
    environment:
      POSTGRES_USER: airail_user
      POSTGRES_PASSWORD: airail_pass
      POSTGRES_DB: airail_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airail_user -d airail_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Qdrant Vector Store ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: airail_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
